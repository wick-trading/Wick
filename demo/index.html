<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wick — Headless Trading Components</title>
    <style>
      /* ── Base reset ── */
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: var(--wick-bg, #0b0e11);
        color: var(--wick-text, #eaecef);
        min-height: 100vh;
        transition: background 400ms ease;
      }

      /* Glass theme needs a gradient bg */
      body.theme-glass {
        background: linear-gradient(135deg, #0f0c29 0%, #1a1040 30%, #302b63 60%, #24243e 100%);
        background-attachment: fixed;
      }

      /* ── Layout ── */
      .app {
        max-width: 1400px;
        margin: 0 auto;
        padding: 24px;
      }

      /* ── Header ── */
      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 24px;
      }

      .header h1 {
        font-size: 22px;
        font-weight: 700;
        letter-spacing: -0.02em;
      }

      .header .tagline {
        font-size: 13px;
        color: var(--wick-text-muted, #5e6673);
        margin-top: 2px;
      }

      /* ── Theme Switcher ── */
      .theme-switcher {
        display: flex;
        gap: 4px;
        background: var(--wick-surface, #12161c);
        border: 1px solid var(--wick-border, #252932);
        border-radius: 10px;
        padding: 4px;
      }

      body.theme-glass .theme-switcher {
        background: rgba(15, 15, 35, 0.5);
        backdrop-filter: blur(16px);
        border: 1px solid rgba(255,255,255,0.08);
      }

      .theme-switcher button {
        background: none;
        border: none;
        color: var(--wick-text-muted, #5e6673);
        font-size: 12px;
        font-weight: 500;
        padding: 8px 16px;
        border-radius: 7px;
        cursor: pointer;
        transition: all 150ms ease;
        font-family: inherit;
      }

      .theme-switcher button:hover {
        color: var(--wick-text, #eaecef);
      }

      .theme-switcher button.active {
        background: var(--wick-surface-hover, #1e2530);
        color: var(--wick-text, #eaecef);
        font-weight: 600;
      }

      body.theme-glass .theme-switcher button.active {
        background: rgba(124, 93, 250, 0.2);
        color: #f0f0f8;
      }

      /* ── Grid ── */
      .ticker-row {
        margin-bottom: 20px;
      }

      .main-grid {
        display: grid;
        grid-template-columns: 340px 1fr;
        gap: 20px;
        margin-bottom: 20px;
      }

      .charts-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
      }

      .panel-label {
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: var(--wick-text-muted, #5e6673);
        margin-bottom: 10px;
        padding-left: 4px;
      }

      .chart-panel {
        height: 320px;
      }

      .chart-panel wick-depth-chart,
      .chart-panel wick-candlestick-chart {
        width: 100%;
        height: 280px;
        display: block;
      }

      /* ── Responsive ── */
      @media (max-width: 1000px) {
        .main-grid { grid-template-columns: 1fr; }
        .charts-grid { grid-template-columns: 1fr; }
      }
    </style>
    <!-- Theme CSS loaded dynamically -->
    <link id="theme-css" rel="stylesheet" href="">
  </head>
  <body class="theme-dark">
    <div class="app">
      <div class="header">
        <div>
          <h1>Wick</h1>
          <div class="tagline">Headless trading components for the web</div>
        </div>
        <div class="theme-switcher">
          <button class="active" data-theme="dark">Exchange</button>
          <button data-theme="minimal">Minimal</button>
          <button data-theme="glass">Glass</button>
        </div>
      </div>

      <div class="ticker-row">
        <wick-price-ticker id="ticker" show-details></wick-price-ticker>
      </div>

      <div class="main-grid">
        <div>
          <div class="panel-label">Order Book</div>
          <wick-order-book id="orderbook" depth="14" show-total show-depth></wick-order-book>
        </div>

        <div>
          <div class="panel-label">Recent Trades</div>
          <wick-trade-feed id="tradefeed" max-trades="14"></wick-trade-feed>
        </div>
      </div>

      <div class="charts-grid">
        <div class="chart-panel">
          <div class="panel-label">Market Depth</div>
          <wick-depth-chart id="depthchart" enable-crosshair></wick-depth-chart>
        </div>

        <div class="chart-panel">
          <div class="panel-label">BTC/USD · 1m</div>
          <wick-candlestick-chart id="candlechart" show-volume auto-scroll></wick-candlestick-chart>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
    <script>
      // Theme switcher
      const buttons = document.querySelectorAll('.theme-switcher button');
      const themeLink = document.getElementById('theme-css');
      const themeMap = {
        dark: '/node_modules/@wick/theme/src/dark.css',
        minimal: '/node_modules/@wick/theme/src/minimal.css',
        glass: '/node_modules/@wick/theme/src/glass.css',
      };

      // Load default theme
      themeLink.href = themeMap.dark;

      buttons.forEach(btn => {
        btn.addEventListener('click', () => {
          const theme = btn.dataset.theme;
          buttons.forEach(b => b.classList.remove('active'));
          btn.classList.add('active');

          document.body.className = 'theme-' + theme;
          themeLink.href = themeMap[theme];
        });
      });
    </script>
  </body>
</html>
