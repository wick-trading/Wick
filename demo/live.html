<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vela — Live Binance Demo</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
        background: #0a0a0f;
        color: #e0e0e0;
        padding: 24px;
      }

      h1 { font-size: 20px; font-weight: 600; margin-bottom: 4px; color: #fff; }
      .subtitle { color: #666; font-size: 13px; margin-bottom: 8px; }
      .status { font-size: 12px; margin-bottom: 24px; }
      .status .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
      .status .dot.connected { background: #4dff88; }
      .status .dot.disconnected { background: #ff4d4d; }
      .status .dot.connecting { background: #ffaa00; }

      .controls {
        display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap;
      }
      .controls select, .controls button {
        background: #111118; border: 1px solid #2a2a3a; color: #e0e0e0;
        padding: 6px 12px; border-radius: 4px; font-family: inherit; font-size: 12px;
        cursor: pointer;
      }
      .controls select:hover, .controls button:hover { border-color: #4dff88; }

      .panel {
        background: #111118; border: 1px solid #1e1e2e;
        border-radius: 8px; padding: 16px;
      }
      .panel-title {
        font-size: 12px; text-transform: uppercase;
        letter-spacing: 1px; color: #555; margin-bottom: 12px;
      }

      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 24px; max-width: 1400px;
      }

      vela-order-book table, vela-trade-feed table {
        width: 100%; border-collapse: collapse; font-size: 13px;
      }
      vela-order-book th, vela-trade-feed th {
        text-align: left; font-size: 11px; text-transform: uppercase;
        color: #555; padding: 4px 8px; border-bottom: 1px solid #1e1e2e;
      }
      vela-order-book td, vela-trade-feed td {
        padding: 3px 8px; font-variant-numeric: tabular-nums;
      }

      vela-order-book [part~="ask-row"] [part="price"] { color: #ff4d4d; }
      vela-order-book [part~="bid-row"] [part="price"] { color: #4dff88; }
      vela-trade-feed [part~="buy-row"] [part="price"] { color: #4dff88; }
      vela-trade-feed [part~="sell-row"] [part="price"] { color: #ff4d4d; }

      vela-price-ticker [part="container"] {
        display: flex; align-items: baseline; gap: 16px; font-size: 14px;
      }
      vela-price-ticker [part="symbol"] { font-weight: 700; font-size: 18px; color: #fff; }
      vela-price-ticker [part="price"] {
        font-size: 24px; font-weight: 600; font-variant-numeric: tabular-nums;
      }
      vela-price-ticker [part="change"] { font-size: 14px; }
      vela-price-ticker [data-direction="up"] [part="price"] { color: #4dff88; }
      vela-price-ticker [data-direction="down"] [part="price"] { color: #ff4d4d; }

      @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }
    </style>
  </head>
  <body>
    <h1>Vela — Live Market Data</h1>
    <p class="subtitle">Real-time Binance WebSocket streams powering headless components</p>

    <div class="status" id="status">
      <span class="dot connecting" id="statusDot"></span>
      <span id="statusText">Connecting...</span>
    </div>

    <div class="controls">
      <select id="symbolSelect">
        <option value="btcusdt">BTC/USDT</option>
        <option value="ethusdt">ETH/USDT</option>
        <option value="solusdt">SOL/USDT</option>
        <option value="bnbusdt">BNB/USDT</option>
        <option value="xrpusdt">XRP/USDT</option>
        <option value="dogeusdt">DOGE/USDT</option>
      </select>
      <button id="reconnectBtn">Reconnect</button>
    </div>

    <div style="margin-bottom: 24px;">
      <div class="panel">
        <div class="panel-title">Price Ticker</div>
        <vela-price-ticker id="ticker" show-details></vela-price-ticker>
      </div>
    </div>

    <div class="grid">
      <div class="panel">
        <div class="panel-title">Order Book (Top 20)</div>
        <vela-order-book id="orderbook" depth="20" show-total show-depth></vela-order-book>
      </div>

      <div class="panel" style="grid-column: span 2;">
        <div class="panel-title">Recent Trades</div>
        <vela-trade-feed id="tradefeed" max-trades="40"></vela-trade-feed>
      </div>
    </div>

    <div style="margin-top: 24px;">
      <div class="panel" style="height: 350px;">
        <div class="panel-title">Depth Chart</div>
        <vela-depth-chart id="depthchart" enable-crosshair style="width: 100%; height: 300px;"></vela-depth-chart>
      </div>
    </div>

    <script type="module" src="/src/live.ts"></script>
  </body>
</html>
